# ============================================================
# BeerWalk — entorno de DESARROLLO LOCAL
# Levanta: PocketBase + servicio OCR + LibreTranslate
#
#   docker compose -f docker-compose.local.yml up --build
#
# En producción (Coolify) se usa el MISMO compose cambiando
# únicamente el fichero .env (ver docs/03-migracion-coolify.md).
# ============================================================

services:
  pocketbase:
    build: ./pocketbase
    container_name: beerwalk-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      # Solo se usa la primera vez para crear el superusuario
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ocr:
    build: ./modulo-ocr
    container_name: beerwalk-ocr
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL_INTERNAL:-http://pocketbase:8090}
      - OCR_LANG=${OCR_LANG:-es}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-78}
    volumes:
      # Cache de modelos PaddleOCR para no re-descargar en cada rebuild
      - ocr_models:/root/.paddleocr
    depends_on:
      pocketbase:
        condition: service_healthy

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: beerwalk-translate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Limitamos idiomas para que la primera descarga de modelos sea rápida
      - LT_LOAD_ONLY=${LT_LOAD_ONLY:-es,ca,en}
      - LT_DISABLE_WEB_UI=${LT_DISABLE_WEB_UI:-false}
    volumes:
      - lt_models:/home/libretranslate/.local

volumes:
  pb_data:
  ocr_models:
  lt_models:
